name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  data-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Data quality gate (fixture pipeline, no API key)
        env:
          LTA_USE_FIXTURE: "1"
        run: python -m apac_data.pipelines.check_quality

      - name: Lint
        run: ruff check src tests

      - name: Unit tests
        env:
          LTA_USE_FIXTURE: "1"
        run: pytest -q
